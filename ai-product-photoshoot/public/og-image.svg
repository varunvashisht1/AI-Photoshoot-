<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="55%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#0e1530"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <radialGradient id="glow" cx="950" cy="180" r="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="180" cy="500" r="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- subtle grid -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.4">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
  </g>

  <!-- logo mark -->
  <g transform="translate(80 80)">
    <rect width="84" height="84" rx="20" fill="#0b1220" stroke="url(#brand)" stroke-width="3"/>
    <path d="M18 32a6 6 0 0 1 6-6h6l4-6h12l4 6h6a6 6 0 0 1 6 6v22a6 6 0 0 1-6 6H24a6 6 0 0 1-6-6V32Z" stroke="url(#brand)" stroke-width="3.5" stroke-linejoin="round" fill="url(#brand)" fill-opacity="0.18"/>
    <circle cx="42" cy="44" r="10" stroke="url(#brand)" stroke-width="3.5"/>
    <circle cx="42" cy="44" r="4" fill="url(#brand)"/>
  </g>

  <text x="190" y="135" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="34" font-weight="600" fill="#94a3b8">AI Product Photoshoot</text>

  <!-- main headline -->
  <text x="80" y="290" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="78" font-weight="800" fill="#ffffff">Studio-quality</text>
  <text x="80" y="380" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="78" font-weight="800" fill="url(#brand)">product photos.</text>
  <text x="80" y="455" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="40" font-weight="500" fill="#cbd5e1">Free · Open-source · In your browser.</text>

  <!-- chips -->
  <g font-family="Inter, -apple-system, system-ui, sans-serif" font-size="22" font-weight="600">
    <g transform="translate(80 530)">
      <rect width="170" height="50" rx="25" fill="#0b1220" stroke="#22d3ee" stroke-width="2"/>
      <text x="85" y="32" text-anchor="middle" fill="#67e8f9">FLUX.1</text>
    </g>
    <g transform="translate(265 530)">
      <rect width="120" height="50" rx="25" fill="#0b1220" stroke="#a855f7" stroke-width="2"/>
      <text x="60" y="32" text-anchor="middle" fill="#d8b4fe">SDXL</text>
    </g>
    <g transform="translate(400 530)">
      <rect width="180" height="50" rx="25" fill="#0b1220" stroke="#f472b6" stroke-width="2"/>
      <text x="90" y="32" text-anchor="middle" fill="#fbcfe8">SD 3.5 Turbo</text>
    </g>
    <g transform="translate(595 530)">
      <rect width="210" height="50" rx="25" fill="#0b1220" stroke="#34d399" stroke-width="2"/>
      <text x="105" y="32" text-anchor="middle" fill="#a7f3d0">No signup</text>
    </g>
  </g>
</svg>
