    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "AI Product Photoshoot",
        "url": "https://ai-product-photoshoot.app/",
        "applicationCategory": "DesignApplication",
        "operatingSystem": "Web",
        "browserRequirements": "Requires a modern browser with JavaScript enabled",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "featureList": [
          "Free open-source image generation (FLUX, SDXL, Stable Diffusion 3.5)",
          "No signup or API key required (Pollinations.ai)",
          "Optional Hugging Face token for additional models",
          "24 scene presets across Studio, Lifestyle, Nature, Luxury, Seasonal, Tech",
          "Aspect ratio control for social platforms",
          "Generate up to 4 variations in parallel",
          "Before / after compare slider",
          "Local history of past generations",
          "Negative prompt and lighting / mood controls",
          "Client-side image processing — your data never leaves your browser"
        ],
        "description": "Free in-browser AI product photo generator using open-source models including FLUX, SDXL and Stable Diffusion 3.5. No signup required."
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Is AI Product Photoshoot really free?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. The default provider (Pollinations.ai) requires no account or API key and is completely free. The optional Hugging Face provider is also free — it only asks for a free read token from your Hugging Face account."
            }
          },
          {
            "@type": "Question",
            "name": "Which AI models can I use?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "FLUX.1, FLUX Realism, FLUX 3D, FLUX Anime, SDXL Turbo via Pollinations, plus FLUX.1 Schnell, FLUX.1 Dev, SDXL 1.0, Stable Diffusion 3.5 Large Turbo, and Playground v2.5 via Hugging Face."
            }
          },
          {
            "@type": "Question",
            "name": "Do I need to install anything?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. AI Product Photoshoot runs entirely in your browser. There is no software to install and no backend server stores your data."
            }
          },
          {
            "@type": "Question",
            "name": "Will it preserve my exact product?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "These are text-to-image open-source models, so they generate a fresh scene from your prompt. Your uploaded product photo is a visual reference and powers the before/after compare slider, but is not pixel-locked into the output the way paid image-editing models would be."
            }
          },
          {
            "@type": "Question",
            "name": "Where is my data stored?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Everything stays in your browser. API tokens, generated images, and history are kept in localStorage. Nothing is sent to a server we control."
            }
          }
        ]
      }
    </script>
